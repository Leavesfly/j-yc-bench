# YC-Bench default preset — 1-year benchmark
# Java port: faithful YAML translation of src/yc_bench/config/presets/default.toml.

name: default
description: "1-year benchmark. Tests employee efficiency, client trust, and adversarial client detection."

agent:
  model: "ollama/qwen3.5:4b"
  base_url: "http://localhost:11434/v1"
  temperature: 0.0
  top_p: 1.0
  request_timeout_seconds: 300.0
  retry_max_attempts: 3
  retry_backoff_seconds: 1.0
  history_keep_rounds: 20

loop:
  auto_advance_after_turns: 5

sim:
  start_date: "2025-01-01"
  horizon_years: 1
  company_name: "BenchCo"

world:
  num_employees: 8
  initial_funds_cents: 20000000        # $200,000
  initial_prestige_level: 1.0
  work_hours_per_day: 9.0

  num_market_tasks: 200
  market_browse_default_limit: 50

  salary_bump_pct: 0.01
  salary_max_cents: 10000000           # $100,000 / month cap
  skill_rate_max: 10.0

  prestige_max: 10.0
  prestige_min: 1.0
  penalty_fail_multiplier: 1.0
  penalty_fail_funds_pct: 0.35
  penalty_cancel_multiplier: 1.5
  reward_prestige_scale: 0.30
  prestige_decay_per_day: 0.0

  num_clients: 6
  trust_max: 5.0
  trust_build_rate: 5.0
  trust_fragility: 0.3
  trust_focus_pressure: 0.3
  trust_reward_ceiling: 2.6
  trust_work_reduction_max: 0.50
  trust_gating_fraction: 0.30
  trust_gated_reward_boost: 0.0

  loyalty_rat_fraction: 0.35
  loyalty_severity: 1.0
  loyalty_reveal_trust: 0.0

  prestige_qty_scale: 0.3
  deadline_qty_per_day: 150.0
  deadline_min_biz_days: 7

  task_progress_milestones: []

  workday_start_hour: 9
  workday_end_hour: 18

  dist:
    required_prestige:
      type: triangular
      low: 1
      high: 5
      mode: 1
    reward_funds_cents:
      type: triangular
      low: 200000        # $2,000
      high: 1200000      # $12,000
      mode: 500000       # $5,000
    domain_count:
      type: constant
      value: 1
    required_qty:
      type: triangular
      low: 400
      high: 1500
      mode: 800
    reward_prestige_delta:
      type: beta
      alpha: 1.2
      beta: 2.8
      scale: 0.35
      low: 0.0
      high: 0.35
    required_trust:
      type: triangular
      low: 1
      high: 5
      mode: 2
    skill_boost:
      type: normal
      mean: 0.12
      stdev: 0.06
      low: 0.01
      high: 0.40

  salary_junior:
    name: junior
    share: 0.50
    min_cents: 200000       # $2,000 / month
    max_cents: 400000       # $4,000 / month
    rate_min: 1.0
    rate_max: 4.0

  salary_mid:
    name: mid
    share: 0.35
    min_cents: 600000       # $6,000 / month
    max_cents: 800000       # $8,000 / month
    rate_min: 4.0
    rate_max: 7.0

  salary_senior:
    name: senior
    share: 0.15
    min_cents: 1000000      # $10,000 / month
    max_cents: 1500000      # $15,000 / month
    rate_min: 7.0
    rate_max: 10.0
